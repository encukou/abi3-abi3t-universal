on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    name: "Build wheel: ${{ matrix.name }}"
    strategy:
      matrix:
        include:
        - name: linux
          os: ubuntu-24.04
          freethreaded: false
        - name: macos
          os: macos-latest
          freethreaded: false
        - name: windows-gil
          os: windows-latest
          freethreaded: false
        - name: windows-t
          os: windows-latest
          freethreaded: true
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: '3.15.0-beta.1'
        freethreaded: ${{ matrix.freethreaded }}
        cache: 'pip'
    - run: pip install build
    - run: python -m build --wheel
    - name: Run auditwheel
      if: "matrix.name == 'linux'"
      run: |
        pip install auditwheel
        python -m auditwheel -vv repair dist/* --wheel-dir repaired
        mv dist dist-orig
        mv repaired dist
    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: wheel-${{ matrix.name }}
        path: './dist/*.whl'
  test:
    name: "Test on ${{ matrix.os }}: ${{ matrix.python-version }} (${{ case(matrix.freethreaded, 'FT', 'GIL') }})"
    needs: build
    strategy:
      matrix:
        name: [linux, macos, windows-gil, windows-t]
        python-version: ['3.13', '3.14', '3.15.0-beta.1']
        freethreaded: [true, false]
        include:
        - name: linux
          os: ubuntu-24.04
        - name: macos
          os: macos-latest
        - name: windows-gil
          os: windows-latest
        - name: windows-t
          os: windows-latest
        exclude:
        - name: windows-gil
          freethreaded: true
        - name: windows-t
          freethreaded: false
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
    - name: Download wheel
      uses: actions/download-artifact@v8
      with:
        name: wheel-${{ matrix.name }}
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        freethreaded: ${{ matrix.freethreaded }}
    - name: Install wheel
      run: python -m pip install abi3_abi3t_universal-*.whl
      shell: bash
    - name: Verify
      run: |
        python -c "if True:
            from abi3_abi3t_universal import increment_value
            print(increment_value())  # 0
            print(increment_value())  # 1
            print(increment_value())  # 2
            assert increment_value() == 3
        "
      shell: bash
  pypi-publish:
    name: "Upload to PyPI"
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: pypi
      url: https://pypi.org/p/abi3_abi3t_universal
    permissions:
      id-token: write
    steps:
    - name: Download wheel
      uses: actions/download-artifact@v8
      with:
        pattern: wheel-*
        merge-multiple: true
        path: dist
    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: dist

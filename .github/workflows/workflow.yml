on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    name: Build wheel on ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: '3.15.0-alpha.8'
        cache: 'pip'
    - run: pip install build
    - run: python -m build --wheel
    - name: Run auditwheel
      if: "matrix.os == 'ubuntu-24.04'"
      run: |
        pip install auditwheel
        python -m auditwheel -vv repair dist/* --wheel-dir repaired
        mv dist dist-orig
        mv repaired dist
    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: wheel-${{ matrix.os }}
        path: './dist/*.whl'
  test:
    name: "Test on ${{ matrix.os }}: ${{ matrix.python-version }} (${{ case(matrix.freethreaded, 'FT', 'GIL') }})"
    needs: build
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-latest]
        python-version: ['3.13', '3.14', '3.15.0-alpha.8']
        freethreaded: [true, false]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
    - name: Download wheel
      uses: actions/download-artifact@v8
      with:
        name: wheel-${{ matrix.os }}
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        freethreaded: ${{ matrix.freethreaded }}
    - name: Install wheel
      run: python -m pip install abi3_abi3t_universal-*.whl
      shell: bash
    - name: Verify
      run: |
        python -c "if True:
            from abi3_abi3t_universal import increment_value
            print(increment_value())  # 0
            print(increment_value())  # 1
            print(increment_value())  # 2
            assert increment_value() == 3
        "
      shell: bash
  pypi-publish:
    name: "Upload to PyPI: ${{ matrix.os }}"
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    runs-on: ubuntu-slim
    needs: test
    environment:
      name: pypi
      url: https://pypi.org/p/abi3_abi3t_universal
    permissions:
      id-token: write
    steps:
    - name: Download wheel
      uses: actions/download-artifact@v8
      with:
        name: wheel-*
        merge-multiple: true
    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: .

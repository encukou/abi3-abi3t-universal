on: [push, pull_request, workflow_dispatch]

permissions: {}

jobs:
  build:
    name: "Build wheel: ${{ matrix.name }}"
    permissions:
      contents: read
    strategy:
      matrix:
        include:
        - name: linux
          os: ubuntu-24.04
          freethreaded: false
          env: ""
        - name: macos
          os: macos-latest
          freethreaded: false
          env: ""
        - name: windows-abi3
          os: windows-latest
          freethreaded: false
          env: "DONT_USE_ABI3T=1"
        - name: windows-abi3t
          os: windows-latest
          freethreaded: true
          env: ""
    runs-on: ${{ matrix.os }}
    steps:
    - name: Set environment variable
      run: echo "${{ matrix.env }}" >> $GITHUB_ENV
      shell: bash
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        persist-credentials: false
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.15.0-beta.2'
        freethreaded: ${{ matrix.freethreaded }}
        cache: 'pip'
    - run: pip install build
    - run: python -m build --wheel
    - name: Run auditwheel
      if: "matrix.name == 'linux'"
      run: |
        pip install auditwheel
        python -m auditwheel -vv repair dist/* --wheel-dir repaired
        mv dist dist-orig
        mv repaired dist
    - name: Upload artifact
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
      with:
        name: wheel-${{ matrix.name }}
        path: './dist/*.whl'
  test:
    name: "Test on ${{ matrix.name }}: ${{ matrix.python-version }} (${{ case(matrix.freethreaded, 'FT', 'GIL') }})"
    needs: build
    permissions:
      contents: read
    strategy:
      matrix:
        name: [linux, macos, windows-abi3, windows-abi3t]
        python-version: ['3.13', '3.14', '3.15.0-beta.2']
        freethreaded: [true, false]
        include:
        - name: linux
          os: ubuntu-24.04
        - name: macos
          os: macos-latest
        - name: windows-abi3
          os: windows-latest
        - name: windows-abi3t
          os: windows-latest
        exclude:
        - name: windows-abi3
          freethreaded: true
        - name: windows-abi3t
          freethreaded: false
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
    - name: Download wheel
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: wheel-${{ matrix.name }}
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: ${{ matrix.python-version }}
        freethreaded: ${{ matrix.freethreaded }}
    - name: Install wheel
      run: python -m pip install abi3_abi3t_universal-*.whl
      shell: bash
    - name: Verify
      run: |
        python -c "if True:
            from abi3_abi3t_universal import increment_value
            print(increment_value())  # 0
            print(increment_value())  # 1
            print(increment_value())  # 2
            assert increment_value() == 3
        "
      shell: bash
  pypi-publish:
    name: "Upload to PyPI"
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/abi3_abi3t_universal
    steps:
    - name: Download wheel
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        pattern: wheel-*
        merge-multiple: true
        path: dist
    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: dist

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    name: Build a wheel
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: '3.15.0-alpha.8'
    - run: pip install build
    - run: python -m build --wheel
    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: wheel
        path: './dist/*.whl'
  test:
    name: Test the wheel
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        python-version: ['3.13', '3.14', '3.15.0-alpha.8']
        free-threaded: [true, false]
      fail-fast: false
    steps:
    - name: Download wheel
      uses: actions/download-artifact@v8
      with:
        name: wheel
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        freethreaded: ${{ matrix.free-threaded }}
    - name: Install wheel
      run: python -m pip install abi3_abi3t_universal-*.whl
    - name: Verify
      run: |
        python -c "if True:
            from abi3_abi3t_universal import increment_value
            print(increment_value())  # 0
            print(increment_value())  # 1
            print(increment_value())  # 2
            assert increment_value() == 3
        "
